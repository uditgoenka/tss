name: Publish crates.io package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref_name, 'v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Validate crate
        run: |
          cargo fmt --check
          cargo test
          cargo package --no-verify
          cargo publish --dry-run

      - name: Check crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
          else
            echo "CARGO_REGISTRY_TOKEN is configured; crates.io publish will run."
          fi

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
